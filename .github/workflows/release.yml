name: Release

run-name: >-
  Release · ${{ github.event_name == 'workflow_dispatch' && 'preview (Android only)' || github.event_name == 'pull_request' && 'version-bump notice' || 'production' }} · @${{ github.actor }}

# Production: a push to main that changes the root package.json version.
# (The paths filter fires on ANY root package.json edit — e.g. adding a dep —
# so the version job below no-ops cleanly when the version is unchanged.)
# Preview: manual dispatch → Android EAS preview build only. The PWA has no
# preview environment (see AGENTS.md); it is pre-validated by the
# exported-build Playwright suite and deploys to production only.
# Pull requests: version-bump-notice only — a comment warning that merging
# will trigger a production release. Every other job is gated on event_name,
# so nothing builds or deploys from a PR.
on:
  push:
    branches: [main]
    paths: [package.json]
  pull_request:
    branches: [main]
    paths: [package.json]
  workflow_dispatch:

# Never interleave two releases; don't cancel one already in flight. PR
# notice runs get a per-PR group so they never queue behind (or displace)
# a real release.
concurrency:
  group: ${{ github.event_name == 'pull_request' && format('release-pr-{0}', github.event.pull_request.number) || 'release' }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  version:
    name: Version gate (package.json is truth)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.gate.outputs.version }}
      release: ${{ steps.gate.outputs.release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need all tags for the comparison
      - name: Read and validate the version
        id: gate
        run: |
          VERSION=$(jq -r .version package.json)
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::package.json version '$VERSION' is not strict semver X.Y.Z"
            exit 1
          fi
          if git rev-parse -q --verify "refs/tags/v$VERSION" >/dev/null; then
            echo "Tag v$VERSION already exists — package.json changed without a version bump; nothing to release."
            echo "release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          LATEST=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          if [ -n "$LATEST" ]; then
            HIGHEST=$(printf '%s\n%s\n' "${LATEST#v}" "$VERSION" | sort -V | tail -n1)
            if [ "$HIGHEST" != "$VERSION" ]; then
              echo "::error::version $VERSION is below the latest tag $LATEST — downgrade/typo?"
              exit 1
            fi
          fi
          echo "Releasing v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release=true" >> "$GITHUB_OUTPUT"

  deploy-pwa:
    name: Deploy PWA (Worker static assets)
    needs: version
    if: needs.version.outputs.release == 'true'
    runs-on: ubuntu-latest
    env:
      # Non-secret prod URLs, kept out of the repo per the env-config policy.
      EXPO_PUBLIC_API_BASE_URL: ${{ vars.EXPO_PUBLIC_API_BASE_URL }}
      EXPO_PUBLIC_PARTY_HOST: ${{ vars.EXPO_PUBLIC_PARTY_HOST }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - name: Build shared package
        run: npm run build --workspace=@trap/shared
      - name: Guard repo variables are configured
        run: |
          test -n "$EXPO_PUBLIC_API_BASE_URL" || { echo "::error::repo variable EXPO_PUBLIC_API_BASE_URL is unset"; exit 1; }
          test -n "$EXPO_PUBLIC_PARTY_HOST" || { echo "::error::repo variable EXPO_PUBLIC_PARTY_HOST is unset"; exit 1; }
      # --clear is belt-and-braces on a fresh runner; EXPO_PUBLIC_* is inlined
      # at Metro transform time and must be the production values (AGENTS.md).
      - name: Export web build (production URLs baked)
        working-directory: apps/mobile
        run: npx expo export --platform web --clear
      - name: Verify the prod host is baked into the bundle
        run: grep -rq "$EXPO_PUBLIC_PARTY_HOST" apps/mobile/dist/_expo/static/js/web/
      - name: Deploy Worker + static assets
        working-directory: apps/party
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
      - name: Verify the deployed surface
        run: |
          check() {
            CODE=$(curl -s -o /dev/null -w '%{http_code}' "$1")
            if [ "$CODE" != "$2" ]; then
              echo "::error::$1 returned $CODE (expected $2)"
              exit 1
            fi
            echo "$1 -> $CODE"
          }
          check "$EXPO_PUBLIC_API_BASE_URL/manifest.json" 200
          check "$EXPO_PUBLIC_API_BASE_URL/icons/icon-192.png" 200
          check "$EXPO_PUBLIC_API_BASE_URL/api/auth/me" 401

  build-android:
    name: Build Android APK (EAS production)
    needs: version
    if: needs.version.outputs.release == 'true'
    runs-on: ubuntu-latest
    outputs:
      build_url: ${{ steps.eas.outputs.build_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      # google-services.json is git-ignored; CI recreates it from the secret.
      # .easignore (repo root) keeps it in the EAS upload despite .gitignore.
      - name: Materialize google-services.json from the secret
        working-directory: apps/mobile
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          test -n "$GOOGLE_SERVICES_JSON" || { echo "::error::secret GOOGLE_SERVICES_JSON is unset"; exit 1; }
          printf '%s' "$GOOGLE_SERVICES_JSON" > google-services.json
          jq -e .project_info google-services.json >/dev/null || { echo "::error::GOOGLE_SERVICES_JSON is not valid google-services.json content"; exit 1; }
      # Waits for the cloud build (~10-20 min): the tag must mean "everything
      # actually shipped". EXPO_PUBLIC_* comes from the EAS production
      # environment (eas.json profile), not from this job's env.
      - name: EAS build (production profile, wait for completion)
        id: eas
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          npx eas-cli build --profile production --platform android \
            --non-interactive --json \
            -m "release v${{ needs.version.outputs.version }}" > build.json
          jq . build.json
          echo "build_url=$(jq -r '.[0].artifacts.buildUrl // empty' build.json)" >> "$GITHUB_OUTPUT"

  tag-and-release:
    name: Tag + GitHub Release
    needs: [version, deploy-pwa, build-android]
    if: needs.version.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create tag and Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.version.outputs.version }}
          APK_URL: ${{ needs.build-android.outputs.build_url }}
          PWA_URL: ${{ vars.EXPO_PUBLIC_API_BASE_URL }}
        run: |
          {
            echo "**PWA:** $PWA_URL"
            if [ -n "$APK_URL" ]; then
              echo "**Android APK (sideload):** $APK_URL"
            else
              echo "**Android APK (sideload):** see the EAS build list (https://expo.dev)"
            fi
          } > notes.md
          gh release create "v$VERSION" \
            --target "$GITHUB_SHA" \
            --title "v$VERSION" \
            --notes-file notes.md \
            --generate-notes

  android-preview:
    name: Android preview build (EAS, no tag)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      # Same materialization as the production job — see the comment there.
      - name: Materialize google-services.json from the secret
        working-directory: apps/mobile
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          test -n "$GOOGLE_SERVICES_JSON" || { echo "::error::secret GOOGLE_SERVICES_JSON is unset"; exit 1; }
          printf '%s' "$GOOGLE_SERVICES_JSON" > google-services.json
          jq -e .project_info google-services.json >/dev/null || { echo "::error::GOOGLE_SERVICES_JSON is not valid google-services.json content"; exit 1; }
      - name: EAS build (preview profile)
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          npx eas-cli build --profile preview --platform android \
            --non-interactive \
            -m "preview ${GITHUB_SHA::7} (${GITHUB_REF_NAME})"

  version-bump-notice:
    name: Version-bump notice (PR comment)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    # Job-level override: this is the only job that writes to PRs, and it
    # needs nothing else (checkout reads the merge ref).
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Compare the version against the base branch
        id: detect
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch --no-tags --depth=1 origin "$BASE_REF"
          BASE=$(git show FETCH_HEAD:package.json | jq -r .version)
          HEAD=$(jq -r .version package.json)
          echo "Base version: $BASE — PR version: $HEAD"
          echo "base=$BASE" >> "$GITHUB_OUTPUT"
          echo "head=$HEAD" >> "$GITHUB_OUTPUT"
          echo "changed=$([ "$BASE" != "$HEAD" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
      # Upsert keyed on a hidden marker: PRs see many pushes, and each
      # synchronize re-runs this job — edit the existing comment instead of
      # stacking duplicates. If a later push reverts the bump, the comment is
      # corrected rather than left stale.
      - name: Post or update the PR comment
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          BASE: ${{ steps.detect.outputs.base }}
          HEAD: ${{ steps.detect.outputs.head }}
          CHANGED: ${{ steps.detect.outputs.changed }}
        run: |
          MARKER='<!-- release-version-bump-notice -->'
          if [ "$CHANGED" = "true" ]; then
            BODY=$(printf '%s\n🏷️ **Version change detected:** `%s` → `%s`.\n\nMerging this PR to `main` will trigger the production release pipeline (PWA deploy + Android EAS build + tag `v%s`).' "$MARKER" "$BASE" "$HEAD" "$HEAD")
          else
            BODY=$(printf '%s\n`package.json` is modified but the version is unchanged (`%s`) — merging will **not** trigger a release.' "$MARKER" "$HEAD")
          fi
          EXISTING=$(gh api "repos/$GITHUB_REPOSITORY/issues/$PR/comments" --paginate \
            --jq ".[] | select(.body | startswith(\"$MARKER\")) | .id" | head -n1)
          if [ -n "$EXISTING" ]; then
            gh api --method PATCH "repos/$GITHUB_REPOSITORY/issues/comments/$EXISTING" -f body="$BODY" >/dev/null
            echo "Updated comment $EXISTING"
          elif [ "$CHANGED" = "true" ]; then
            gh pr comment "$PR" --body "$BODY"
            echo "Posted new comment"
          else
            echo "No version change and no prior notice — nothing to post."
          fi
