name = "trapcard-party"
main = "src/server.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Local `wrangler dev` server. Bind all interfaces so the Worker is reachable at
# this machine's LAN IP — both from a physical device on the same Wi-Fi (Expo Go)
# and from this machine's browser when apps/mobile/.env points EXPO_PUBLIC_* at
# the LAN IP. (The Playwright e2e overrides this with `--ip 127.0.0.1`.)
[dev]
ip = "0.0.0.0"
port = 8787

# Durable Object: one instance per lobby code.
[[durable_objects.bindings]]
name = "LOBBY"
class_name = "LobbyDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["LobbyDO"]

# D1: accounts, device tokens, lobby history.
[[d1_databases]]
binding = "DB"
database_name = "trapcard"
database_id = "11e42ffc-46f4-4c0d-84a4-67acfca29e32"

# KV: opaque auth tokens.
[[kv_namespaces]]
binding = "TOKENS"
id = "7477828cbae44f9f8bd7e6863e588567"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

# Serve the exported Expo web build (iOS PWA) from this Worker — same origin as
# the API and WebSocket, one deploy. `run_worker_first` is load-bearing: without
# it the SPA fallback would answer /api/* calls and the /parties/* WebSocket
# upgrade with index.html. `single-page-application` serves index.html for deep
# links (/lobby/ABCD), which the client router hydrates from the URL.
[assets]
directory = "../mobile/dist"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/parties/*"]
