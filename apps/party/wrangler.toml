name = "trapcard-party"
main = "src/server.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Durable Object: one instance per lobby code.
[[durable_objects.bindings]]
name = "LOBBY"
class_name = "LobbyDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["LobbyDO"]

# D1: accounts, device tokens, lobby history.
[[d1_databases]]
binding = "DB"
database_name = "trapcard"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

# KV: opaque auth tokens.
[[kv_namespaces]]
binding = "TOKENS"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
