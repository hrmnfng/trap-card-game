# Full flow: register player 1 on the device, join the lobby created by the
# player-2 helper, then drive the three-stage lifecycle:
#   1. ready up in the lobby
#   2. author + submit 3 statements in prep
#   3. play a card once the helper begins the game
# Catches the WS-connect / game-entry crash (missing crypto global on Hermes).
# Env: LOBBY_CODE (from the helper), P1_USER (unique per run, from the workflow).
# Note: Maestro waits-with-timeout use `extendedWaitUntil`, not `assertVisible`.
appId: host.exp.exponent
---
- launchApp:
    clearState: true
- openLink: exp://10.0.2.2:8081
# App boots to the unauthenticated home; tap through to the login screen.
- extendedWaitUntil:
    visible: "Sign in / Register"
    timeout: 120000
- waitForAnimationToEnd
- tapOn:
    id: "signin-cta"
# The first tap occasionally races the initial render and doesn't navigate;
# re-tap (optional, so it's a harmless no-op once the login screen is showing).
- runFlow:
    when:
      notVisible:
        id: "auth-submit"
    commands:
      - tapOn:
          id: "signin-cta"
          optional: true
- extendedWaitUntil:
    visible:
      id: "auth-submit"
    timeout: 30000
# Switch to "register" and create player 1.
- tapOn:
    id: "auth-toggle"
- tapOn: "Username"
- inputText: ${P1_USER}
- tapOn: "Password"
- inputText: "password1"
- tapOn:
    id: "auth-submit"
# On success the app returns to the (now authenticated) home screen.
- extendedWaitUntil:
    visible: "Welcome, ${P1_USER}"
    timeout: 30000
# Join the helper's lobby by code.
- tapOn: "Lobby code"
- inputText: ${LOBBY_CODE}
- tapOn:
    id: "join-lobby"
# Stage 1: ready up in the lobby.
- extendedWaitUntil:
    visible:
      id: "ready-toggle"
    timeout: 30000
- tapOn:
    id: "ready-toggle"
# Stage 2: the helper starts prep once both are ready; author + submit a hand.
- extendedWaitUntil:
    visible:
      id: "statement-0"
    timeout: 30000
- tapOn:
    id: "statement-0"
- inputText: "device trap 1"
- tapOn:
    id: "statement-1"
- inputText: "device trap 2"
- tapOn:
    id: "statement-2"
- inputText: "device trap 3"
- tapOn:
    id: "submit-cards"
# Stage 3: the helper begins the game once all submitted; play a card.
- extendedWaitUntil:
    visible:
      id: "hand-card"
    timeout: 60000
- tapOn:
    id: "hand-card"
    index: 0
- tapOn:
    id: "opponent"
    index: 0
- extendedWaitUntil:
    visible:
      text: "${P1_USER} played.*"
    timeout: 20000
