# Boot smoke: load the project in Expo Go and assert the login screen renders.
# Catches boot-time Hermes crashes (Reanimated native init, missing EventTarget).
appId: host.exp.exponent
---
- launchApp:
    clearState: true
- openLink: exp://10.0.2.2:8081
# extendedWaitUntil (not assertVisible) is how Maestro waits up to a timeout; the
# first Expo Go bundle load is slow, so allow a generous window.
- extendedWaitUntil:
    visible:
      id: "auth-submit"
    timeout: 120000
